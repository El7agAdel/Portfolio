<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = location.pathname
        if (path.indexOf('/portfolio/') === 0) {
          sessionStorage.redirect = path
        }
        location.replace('/portfolio/')
      })()
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
