<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = location.pathname
        var base = path.indexOf('/portfolio/') === 0 ? '/portfolio/' : '/'
        sessionStorage.redirect = path
        location.replace(base)
      })()
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
